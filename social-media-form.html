<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIVOR | Social Media Információk</title>
    <!-- External Dependencies -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- NIVOR Brand System -->
    <link rel="stylesheet" href="nivor.css">
    <style>
        /* Compact page-specific layout & form elements */
        body {
            background-color: var(--brand-platinum);
            position: relative;
            min-height: 100vh;
        }

        /* Digital Mesh Background Pattern */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(26, 34, 56, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26, 34, 56, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        /* Floating Compact Navbar */
        .nvr-navbar {
            position: fixed;
            top: 1rem;
            left: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-subtle);
        }

        .navbar-actions {
            display: flex;
            align-items: center;
        }

        /* Content Spacing */
        .main-content {
            padding-top: 7rem;
            padding-bottom: 5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Compact Form Container Card */
        .form-container {
            width: 100%;
            max-width: 550px;
            background: var(--surface-white);
            border-radius: var(--radius-md);
            padding: 2.5rem;
            box-shadow: var(--shadow-elevated);
            border: 1px solid rgba(26, 34, 56, 0.06);
            margin-top: 1rem;
        }

        /* Form Layout & Fields */
        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--brand-prussian-blue);
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.35rem;
        }
        .form-group input[type="text"],
        .form-group input[type="url"],
        .form-group select,
        .form-group textarea {
            border: none;
            border-bottom: 2px solid var(--brand-platinum);
            background: transparent;
            padding: 0.5rem 0;
            font-family: 'Manrope', sans-serif;
            font-size: 1rem;
            color: var(--brand-prussian-blue);
            outline: none;
            border-radius: 0;
            transition: border-color 0.3s var(--ease-premium);
        }
        .form-group input[type="text"]:focus,
        .form-group input[type="url"]:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--brand-burnt-peach);
        }
        .form-group select {
            cursor: pointer;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%231A2238' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position: right center;
            padding-right: 2rem;
        }
        .form-group textarea {
            resize: none;
            min-height: 60px;
            overflow-y: hidden;
        }

        .field-note {
            font-size: 0.7rem;
            color: var(--brand-burnt-peach);
            margin-top: 0.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            opacity: 0.9;
        }

        /* Checkbox Styling */
        .checkbox-group {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .checkbox-divider {
            height: 1px;
            background-color: rgba(26, 34, 56, 0.08);
            margin: 0.25rem 0;
            width: 100%;
        }
        .checkbox-container {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            user-select: none;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--brand-prussian-blue);
        }
        .checkbox-text {
            line-height: 24px;
            display: inline-block;
        }
        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }
        .checkmark {
            flex-shrink: 0;
            display: inline-block;
            position: relative;
            height: 24px;
            width: 24px;
            background-color: transparent;
            border: 2px solid var(--brand-platinum);
            border-radius: 6px;
            transition: all 0.2s var(--ease-premium);
        }
        .checkbox-container:hover input ~ .checkmark {
            border-color: var(--brand-burnt-peach);
        }
        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--brand-burnt-peach);
            border-color: var(--brand-burnt-peach);
        }
        .checkmark::after {
            content: "";
            position: absolute;
            display: none;
        }
        .checkbox-container input:checked ~ .checkmark::after {
            display: block;
        }
        .checkbox-container .checkmark::after {
            left: 7px;
            top: 3px;
            width: 5px;
            height: 11px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* Error/Alert Message Banner */
        .alert-banner {
            display: none;
            background-color: var(--brand-soft-blush);
            border-left: 4px solid var(--brand-burnt-peach);
            padding: 0.8rem 1.2rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.5rem;
            color: var(--brand-prussian-blue);
            font-size: 0.9rem;
            font-weight: 600;
            align-items: center;
            gap: 0.6rem;
        }

        /* Animation utilities */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }

        /* Success Overlay Screen */
        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26, 34, 56, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s var(--ease-premium);
        }
        .success-overlay.active {
            display: flex;
            opacity: 1;
        }
        .success-card {
            padding: 2.5rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            background: var(--surface-white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-floating);
            transform: translateY(20px);
            transition: transform 0.4s var(--ease-premium);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .success-overlay.active .success-card {
            transform: translateY(0);
        }
        .success-icon {
            font-size: 3.5rem;
            color: var(--brand-burnt-peach);
            margin-bottom: 1rem;
            line-height: 1;
        }
        .success-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--brand-prussian-blue);
            margin-bottom: 0.5rem;
        }
        .success-desc {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }

        /* Responsive Overrides */
        @media (max-width: 768px) {
            .nvr-navbar {
                top: 0.75rem;
                left: 1rem;
                right: 1rem;
                padding: 0.6rem 1rem;
            }
            .main-content {
                padding-top: 6rem;
            }
            .form-container {
                padding: 1.75rem 1.25rem;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- Floating Compact Header -->
    <header class="nvr-navbar glass">
        <a href="index.html" class="btn-nvr btn-nvr--outline" style="padding: 0.6rem 1.2rem; font-size: 0.7rem; gap: 0.3rem;">
            <i class="bi bi-chevron-left"></i> Vissza
        </a>
        <div class="navbar-actions">
            <img src="https://nivor.hu/nvr-content/marka/AB_MT_logoB.png" alt="NIVOR Logo" style="height: 34px; width: auto; display: block;" />
            <span style="font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1.45rem; letter-spacing: -0.05em; color: var(--brand-prussian-blue); line-height: 1; margin-left: 0.4rem; user-select: none;">NIVOR</span>
        </div>
    </header>

    <!-- Main Content Panel -->
    <main class="editorial-wrapper main-content">
        <!-- The Questionnaire Card Container -->
        <div class="form-container">
            <span class="section-tag" style="margin-bottom: 0.5rem;">KÉRDŐÍV</span>
            <h2 style="margin-bottom: 1.75rem; font-weight: 800; font-size: 1.8rem;">Social Media Információk</h2>

            <!-- Error Banner -->
            <div class="alert-banner" id="errorBanner" role="alert">
                <i class="bi bi-exclamation-triangle-fill" style="color: var(--brand-burnt-peach); font-size: 1.1rem;"></i>
                <span id="errorText">Hiba történt az adatok ellenőrzése során.</span>
            </div>

            <!-- Questionnaire Form -->
            <form id="socialMediaForm" novalidate>
                <!-- Category dropdown -->
                <div class="form-group">
                    <label for="category">Category / Kategória</label>
                    <select id="category" name="category" required>
                        <option value="" disabled selected>Válasszon kategóriát...</option>
                        <option value="Social Media">Social Media</option>
                        <option value="News & Blogs">News & Blogs</option>
                        <option value="Booking & Reviews">Booking & Reviews</option>
                        <option value="Video Platforms">Video Platforms</option>
                        <option value="Other">Other / Egyéb</option>
                    </select>
                </div>

                <!-- Social Media Post URL -->
                <div class="form-group">
                    <label for="url">Post URL / Bejegyzés URL</label>
                    <input type="url" id="url" name="url" placeholder="https://facebook.com/posts/..." required />
                </div>

                <!-- Country input (optional, falls back to empty string in payload) -->
                <div class="form-group">
                    <label for="country">Country / Ország</label>
                    <input type="text" id="country" name="country" placeholder="Magyarország" />
                </div>

                <!-- Region input (optional, falls back to empty string in payload) -->
                <div class="form-group">
                    <label for="region">Region / Régió</label>
                    <input type="text" id="region" name="region" placeholder="Pest megye" />
                </div>

                <!-- City input (optional, falls back to empty string in payload) -->
                <div class="form-group">
                    <label for="city">City / Város</label>
                    <input type="text" id="city" name="city" placeholder="Budapest" />
                </div>

                <!-- Description textarea (optional, falls back to empty string in payload) -->
                <div class="form-group">
                    <label for="description">Description / Leírás</label>
                    <textarea id="description" name="description" placeholder="A bejegyzés vagy kampány rövid bemutatása..."></textarea>
                </div>

                <!-- Checkboxes -->
                <div class="checkbox-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="stealable" name="stealable">
                        <span class="checkmark"></span>
                        <span class="checkbox-text">Stealable / Ellopható</span>
                    </label>

                    <div class="checkbox-divider"></div>

                    <label class="checkbox-container">
                        <input type="checkbox" id="metadata" name="metadata">
                        <span class="checkmark"></span>
                        <span class="checkbox-text">Meta data / Meta adatok</span>
                    </label>

                    <label class="checkbox-container">
                        <input type="checkbox" id="comments" name="comments">
                        <span class="checkmark"></span>
                        <span class="checkbox-text">Comments / Kommentek</span>
                    </label>

                    <label class="checkbox-container">
                        <input type="checkbox" id="transcript" name="transcript">
                        <span class="checkmark"></span>
                        <span class="checkbox-text">Transcript / Leirat</span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-nvr btn-nvr--primary" id="submitBtn" style="width: 100%; justify-content: center; gap: 0.6rem; padding: 1rem 2rem;">
                    <span>Adatok Beküldése</span> <i class="bi bi-send" id="submitIcon"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- Success Modal Overlay -->
    <div class="success-overlay" id="successOverlay" role="dialog" aria-modal="true" aria-labelledby="successTitle">
        <div class="success-card glass">
            <div class="success-icon">
                <i class="bi bi-check-circle-fill"></i>
            </div>
            <h2 class="success-title" id="successTitle">Sikeres beküldés!</h2>
            <p class="success-desc">A bejegyzés adatai sikeresen továbbításra kerültek az n8n webhook felé.</p>
            <button class="btn-nvr btn-nvr--primary" id="successCloseBtn" style="width: 100%; justify-content: center; padding: 1rem 2rem;">
                Rendben
            </button>
        </div>
    </div>

    <!-- JS Logic -->
    <script>
        // Webhook URL configuration loaded dynamically from config.json
        let N8N_WEBHOOK_URL = "";

        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                if (response.ok) {
                    const config = await response.json();
                    N8N_WEBHOOK_URL = config.N8N_WH_Social || "";
                } else {
                    console.warn('Nem sikerült betölteni a config.json konfigurációs fájlt.');
                }
            } catch (err) {
                console.error('Hiba a konfiguráció betöltésekor:', err);
            }
        }
        loadConfig();

        // DOM Elements
        const form = document.getElementById('socialMediaForm');
        const submitBtn = document.getElementById('submitBtn');
        const submitIcon = document.getElementById('submitIcon');
        const errorBanner = document.getElementById('errorBanner');
        const errorText = document.getElementById('errorText');
        const descriptionTextarea = document.getElementById('description');

        const successOverlay = document.getElementById('successOverlay');
        const successCloseBtn = document.getElementById('successCloseBtn');

        // Auto-resize Description Textarea based on input content
        descriptionTextarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // Hide Error Banner
        function hideError() {
            errorBanner.style.display = 'none';
        }

        // Show Error Banner
        function showError(msg) {
            errorText.textContent = msg;
            errorBanner.style.display = 'flex';
            errorBanner.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Open Success Screen
        function showSuccess() {
            successOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // prevent background scroll
        }

        // Close Success Screen
        function closeSuccess() {
            successOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        successCloseBtn.addEventListener('click', closeSuccess);

        // Form Submit Handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            // Verification of Dynamic Webhook URL from config.json
            if (!N8N_WEBHOOK_URL) {
                showError('Konfigurációs figyelmeztetés: A Webhook URL nincs megadva. Kérjük, állítsd be az N8N_WH_Social mezőt a config.json fájlban!');
                console.warn('NIVOR Integration Error: N8N_WH_Social is empty. Please set it in config.json.');
                return;
            }

            // Client-side Validation Checks
            if (!form.checkValidity()) {
                const firstInvalid = form.querySelector(':invalid');
                if (firstInvalid) firstInvalid.focus();
                showError('Kérjük, töltsd ki az összes kötelező mezőt érvényes adatokkal!');
                return;
            }

            // Gather Data
            const formData = {
                timestamp: new Date().toISOString(),
                category: document.getElementById('category').value || "",
                url: (document.getElementById('url').value || "").trim(),
                country: (document.getElementById('country').value || "").trim(),
                region: (document.getElementById('region').value || "").trim(),
                city: (document.getElementById('city').value || "").trim(),
                description: (document.getElementById('description').value || "").trim(),
                stealable: document.getElementById('stealable').checked,
                metadata: document.getElementById('metadata').checked,
                comments: document.getElementById('comments').checked,
                transcript: document.getElementById('transcript').checked
            };

            // Loading state
            submitBtn.disabled = true;
            submitBtn.querySelector('span').textContent = 'Küldés folyamatban...';
            submitIcon.className = 'bi bi-arrow-repeat animate-spin';

            try {
                // POST fetch to n8n Webhook URL
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    form.reset();
                    descriptionTextarea.style.height = 'auto'; // Reset text area height
                    showSuccess();
                } else {
                    throw new Error(`A szerver válasza: ${response.status} ${response.statusText}`);
                }
            } catch (err) {
                console.error(err);
                showError(`Nem sikerült elküldeni az adatokat a webhooknak. Ellenőrizd a kapcsolatot és a config.json fájlban megadott Webhook URL-t! Részletek: ${err.message}`);
            } finally {
                // Restore state
                submitBtn.disabled = false;
                submitBtn.querySelector('span').textContent = 'Adatok Beküldése';
                submitIcon.className = 'bi bi-send';
            }
        });
    </script>
</body>
</html>
