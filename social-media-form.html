<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIVOR | Social Media Információk</title>
    <!-- External Dependencies -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- NIVOR Brand System -->
    <link rel="stylesheet" href="nivor.css">
    <!-- Page-Specific Layout Styling -->
    <link rel="stylesheet" href="social-media-form.css">
    <!-- NIVOR Global Submit ID Utility -->
    <script src="global_submitid.js"></script>
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- Floating Compact Header -->
    <header class="nvr-navbar glass">
        <a href="index.html" class="btn-nvr btn-nvr--outline nav-back-btn">
            <i class="bi bi-chevron-left"></i> Vissza
        </a>
        <div class="navbar-actions">
            <img src="https://nivor.hu/nvr-content/marka/AB_MT_logoB.png" alt="NIVOR Logo" style="height: 34px; width: auto; display: block;" />
            <span class="nav-logo-text">NIVOR</span>
        </div>
    </header>

    <!-- Main Content Panel -->
    <main class="editorial-wrapper main-content">
        <!-- The Questionnaire Card Container -->
        <div class="form-wrapper-outer">
            <span class="section-tag" style="margin-bottom: 0.5rem; text-align: center; display: block;">KÉRDŐÍV</span>
            <h2 class="form-title" style="text-align: center;">Social Media Információk</h2>

            <!-- Error Banner -->
            <div class="alert-banner" id="errorBanner" role="alert">
                <i class="bi bi-exclamation-triangle-fill" style="color: var(--brand-burnt-peach); font-size: 1.1rem;"></i>
                <span id="errorText">Hiba történt az adatok ellenőrzése során.</span>
            </div>

            <!-- Questionnaire Form -->
            <form id="socialMediaForm" novalidate>
                
                <!-- Island 1: Post URL -->
                <div class="form-card-island">
                    <div class="form-section-header">
                        <i class="bi bi-link-45deg"></i> Post URL / Bejegyzés URL
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="url">Post URL / Bejegyzés URL</label>
                        <input type="url" id="url" name="url" placeholder="https://facebook.com/posts/..." required />
                    </div>
                </div>

                <!-- Island 2: Alapadatok -->
                <div class="form-card-island">
                    <div class="form-section-header">
                        <i class="bi bi-card-list"></i> Alapadatok / Basic Info
                    </div>
                    <div class="form-group">
                        <label for="category">Category / Kategória</label>
                        <select id="category" name="category" required>
                            <option value="" disabled selected>Válasszon kategóriát...</option>
                            <option value="Destination General">Destination General</option>
                            <option value="Destination Programs">Destination Programs</option>
                            <option value="Destination Gastronomy">Destination Gastronomy</option>
                            <option value="Destination Visit Instead">Destination Visit Instead</option>
                            <option value="Travel Tips & Tricks">Travel Tips & Tricks</option>
                            <option value="Travel Politics">Travel Politics</option>
                            <option value="Planning Tools">Planning Tools</option>
                            <option value="Competition">Competition</option>
                            <option value="Business Tools">Business Tools</option>
                            <option value="Business Legal">Business Legal</option>
                            <option value="Ideas & Tutorials">Ideas & Tutorials</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Description / Leírás</label>
                        <textarea id="description" name="description" placeholder="A bejegyzés vagy kampány rövid bemutatása..."></textarea>
                    </div>

                    <div style="margin-top: 1rem;">
                        <label class="checkbox-container">
                            <input type="checkbox" id="stealable" name="stealable">
                            <span class="checkmark"></span>
                            <span class="checkbox-text">Stealable / Ellopható</span>
                        </label>
                    </div>
                </div>

                <!-- Island 3: Lokáció -->
                <div class="form-card-island">
                    <div class="form-section-header">
                        <i class="bi bi-geo-alt"></i> Földrajzi adatok / Geographical Info
                    </div>
                    <div class="form-row form-row--three-cols">
                        <!-- Country input -->
                        <div class="form-group">
                            <label for="country">Country / Ország</label>
                            <input type="text" id="country" name="country" placeholder="pl. Olaszország" />
                        </div>

                        <!-- Region input -->
                        <div class="form-group">
                            <label for="region">Region / Régió</label>
                            <input type="text" id="region" name="region" placeholder="pl. Toszkána" />
                        </div>

                        <!-- City input -->
                        <div class="form-group">
                            <label for="city">City / Város</label>
                            <input type="text" id="city" name="city" placeholder="pl. Firenze" />
                        </div>
                    </div>
                </div>

                <!-- Island 4: Scrape adatok -->
                <div class="form-card-island">
                    <div class="form-section-header">
                        <i class="bi bi-cloud-download"></i> Scrape adatok / Scrape Info
                    </div>
                    
                    <!-- Checkboxes -->
                    <div class="checkbox-grid">
                        <label class="checkbox-container">
                            <input type="checkbox" id="metadata" name="metadata">
                            <span class="checkmark"></span>
                            <span class="checkbox-text">Meta data / Meta adatok</span>
                        </label>

                        <label class="checkbox-container">
                            <input type="checkbox" id="transcript" name="transcript">
                            <span class="checkmark"></span>
                            <span class="checkbox-text">Transcript / Leirat</span>
                        </label>

                        <label class="checkbox-container">
                            <input type="checkbox" id="comments" name="comments">
                            <span class="checkmark"></span>
                            <span class="checkbox-text">Comments / Kommentek</span>
                        </label>
                    </div>

                    <div id="commentsSubSection" class="comments-subsection" style="display: none;">
                        <!-- Comments Count -->
                        <div class="form-group">
                            <label for="commentsCount">Comments Count / Kommentek száma</label>
                            <select id="commentsCount" name="commentsCount">
                                <option value="5">5</option>
                                <option value="10">10</option>
                                <option value="20" selected>20</option>
                                <option value="30">30</option>
                                <option value="40">40</option>
                                <option value="50">50</option>
                            </select>
                        </div>

                        <!-- Replies Checkbox -->
                        <label class="checkbox-container">
                            <input type="checkbox" id="replies" name="replies">
                            <span class="checkmark"></span>
                            <span class="checkbox-text">Replies / Válaszok</span>
                        </label>

                        <!-- Replies Count Dropdown -->
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="repliesCount">Replies Count / Válaszok száma</label>
                            <select id="repliesCount" name="repliesCount" disabled>
                                <option value="" disabled selected>-</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-nvr btn-nvr--primary" id="submitBtn" style="width: 100%; justify-content: center; gap: 0.6rem; padding: 1.1rem 2rem;">
                    <span>Adatok Beküldése</span> <i class="bi bi-send" id="submitIcon"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- Success Modal Overlay -->
    <div class="success-overlay" id="successOverlay" role="dialog" aria-modal="true" aria-labelledby="successTitle">
        <div class="success-card glass">
            <div class="success-icon">
                <i class="bi bi-check-circle-fill"></i>
            </div>
            <h2 class="success-title" id="successTitle">Sikeres beküldés!</h2>
            <p class="success-desc">A bejegyzés adatai sikeresen továbbításra kerültek az n8n webhook felé.</p>
            <button class="btn-nvr btn-nvr--primary" id="successCloseBtn" style="width: 100%; justify-content: center; padding: 1rem 2rem;">
                Rendben
            </button>
        </div>
    </div>

    <!-- Page Interaction Script -->
    <script src="social-media-form.js"></script>
</body>
</html>
